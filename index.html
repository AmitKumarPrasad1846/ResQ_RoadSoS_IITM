<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResQ — Every Second Counts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* ── FULL-SCREEN WRAPPER ── */
    .landing {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 40px 52px;
      text-align: center;
      overflow: hidden;
    }

    /* ── BACKGROUND IMAGE ── */
    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* ── DARK OVERLAY for readability ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 10, 25, 0.55) 0%,
        rgba(5, 10, 25, 0.35) 40%,
        rgba(5, 10, 25, 0.55) 100%
      );
      z-index: 1;
    }

    /* ── ALL CONTENT above overlay ── */
    .top, .middle, .bottom {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    /* ══════════════
       TOP — LOGO TEXT
    ══════════════ */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.1s;
    }

    .logo-wordmark {
      font-family: 'Potta One', cursive;
      font-size: clamp(52px, 8vw, 90px);
      line-height: 1;
      letter-spacing: -1px;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }
    .logo-wordmark span { color: #F90404; }

    .tagline {
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 400;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.5px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 300;
      color: rgba(255,255,255,0.78);
      max-width: 700px;
      line-height: 1.65;
      margin-top: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }

    /* ══════════════
       MIDDLE — SHIELD LOGO
    ══════════════ */
    .middle {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.3s;
    }

    .shield-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Glowing halo behind logo */
    .shield-wrap::before {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 48, 48, 0.28) 0%, transparent 70%);
      filter: blur(24px);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .shield-img {
      width: clamp(220px, 28vw, 340px);
      height: auto;
      position: relative;
      filter: drop-shadow(0 0 32px rgba(224, 48, 48, 0.45))
              drop-shadow(0 0 80px rgba(30, 80, 180, 0.3));
      animation: float 4s ease-in-out infinite;
    }

    /* ══════════════
       BOTTOM — BUTTONS
    ══════════════ */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      animation: fadeUp 1s ease both;
      animation-delay: 0.55s;
    }

    .btn-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.92);
      color: #1a1a2e;
      padding: 14px 36px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.18s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }
    .btn-pill:hover {
      background: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .btn-pill:active { transform: translateY(0); }

    .btn-pill .play-icon {
      font-size: 13px;
      opacity: 0.75;
    }

    /* ══════════════
       ANIMATIONS
    ══════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.12); }
    }

    /* ══════════════
       RESPONSIVE
    ══════════════ */
    @media (max-width: 700px) {
      .landing { padding: 36px 24px 40px; }
      .bottom { gap: 12px; }
      .btn-pill { padding: 12px 24px; font-size: 14px; }
      .shield-wrap::before { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>

  <div class="landing">

    <!-- BACKGROUND -->
    <img src="background 1.png" alt="" class="bg-image" />
    <div class="overlay"></div>

    <!-- TOP: Logo text + tagline -->
    <div class="top">
      <div class="logo-wordmark">Res<span>Q</span></div>
      <p class="tagline">Every second counts</p>
      <p class="subtitle">
        Smart accident detection and instant emergency response system<br>
        designed to save lives on the road.
      </p>
    </div>

    <!-- MIDDLE: Shield logo -->
    <div class="middle">
      <div class="shield-wrap">
        <img src="ResQ - transparent 1.png" alt="ResQ Shield" class="shield-img" />
      </div>
    </div>

    <!-- BOTTOM: Action buttons -->
    <div class="bottom">
      <a href="index.html" class="btn-pill">Go to Home</a>
      <a href="#" class="btn-pill">
        <span class="play-icon">▶</span>
        Watch Demo
      </a>
      <a href="index.html#features" class="btn-pill">Explore Features</a>
    </div>

  </div>

</body>
</html>
